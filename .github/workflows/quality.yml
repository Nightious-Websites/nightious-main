name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Chrome
        run: sudo bash scripts/ensure-chrome.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Media budget
        run: npm run check:media

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Accessibility checks (axe)
        run: npm run check:a11y

      - name: Lighthouse CI
        run: npm run lhci
